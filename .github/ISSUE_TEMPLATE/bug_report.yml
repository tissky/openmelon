name: Bug report
description: Report a reproducible OpenMelon bug. Do not report security vulnerabilities here.
title: "[Bug]: "
labels: ["type:bugfix"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve OpenMelon. Do not report security vulnerabilities in public issues; follow SECURITY.md instead.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps, commands, or workflow state needed to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
