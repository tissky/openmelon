name: Bug report
description: Report a reproducible Skill-Plus Engine bug. Do not report security vulnerabilities here.
title: "[Bug]: "
labels: ["type:bugfix"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Skill-Plus Engine. Do not report security vulnerabilities in public issues; follow SECURITY.md instead.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reproducible example.
      placeholder: |
        1. Run ...
        2. Configure ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - engine
        - dispatcher
        - registry
        - sandbox
        - runtime-python
        - plugins-builtin
        - integration
        - documentation
        - other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Go version, runtime versions, package versions, and relevant command output.
    validations:
      required: false
