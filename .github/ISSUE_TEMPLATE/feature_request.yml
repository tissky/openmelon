name: Feature request
description: Propose an OpenMelon workflow, memory, artifact, provenance, Skill-Plus integration, or runtime feature.
title: "[Feature]: "
labels: ["type:feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What content-production problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the workflow, contract, or runtime change.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Note effects on workflows, artifacts, provenance, labeling, memory, or Skill-Plus integration.
